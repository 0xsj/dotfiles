font:
  normal:
    family: "MesloLGS NF"
  # Normal (roman) font face
  #normal:
  # Font family
  #
  # Default:
  #   - (macOS) Menlo
  #   - (Linux/BSD) monospace
  #   - (Windows) Consolas
  #family: monospace
items:
  - colors:
      # Default colors
      primary:
        background: "#000000"
        foreground: "#b6b6b6"

      # Normal colors
      normal:
        black: "#000000"
        red: "#990000"
        green: "#00a600"
        yellow: "#999900"
        blue: "#0000b2"
        magenta: "#b200b2"
        cyan: "#00a6b2"
        white: "#bfbfbf"

      # Bright colors
      bright:
        black: "#666666"
        red: "#e50000"
        green: "#00d900"
        yellow: "#e5e500"
        blue: "#0000ff"
        magenta: "#e500e5"
        cyan: "#00e5e5"
        white: "#e5e5e5"
  - theme: Terminal-app
colors:
  # Default colors
  primary:
    # hard contrast: background = '#1d2021'
    background: "#282828"
    # soft contrast: background = '#32302f'
    foreground: "#ebdbb2"

  # Normal colors
  normal:
    black: "#282828"
    red: "#cc241d"
    green: "#98971a"
    yellow: "#d79921"
    blue: "#458588"
    magenta: "#b16286"
    cyan: "#689d6a"
    white: "#a89984"

  # Bright colors
  bright:
    black: "#928374"
    red: "#fb4934"
    green: "#b8bb26"
    yellow: "#fabd2f"
    blue: "#83a598"
    magenta: "#d3869b"
    cyan: "#8ec07c"
    white: "#ebdbb2"
theme: Gruvbox-Dark


# key bindings
key_bindings:
  - { key: Comma,     mods: Command,      command:
      {program: "sh", args: ["-c","open ~/.config/alacritty/alacritty.yml"]}     }
  - { key: N,         mods: Command|Shift,      action: SpawnNewInstance       }
  - { key: Space,     mods: Alt,          chars: " "                     }
  - { key: Back, mods: Super, chars: "\x15" } # delete word/line
  - { key: Left,     mods: Alt,     chars: "\x1bb"                       } # one word left
  - { key: Right,    mods: Alt,     chars: "\x1bf"                       } # one word right
  - { key: Left,     mods: Command, chars: "\x1bOH",   mode: AppCursor   } # Home
  - { key: Right,    mods: Command, chars: "\x1bOF",   mode: AppCursor   } # End
